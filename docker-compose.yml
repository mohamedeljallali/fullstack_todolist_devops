services:
  db:
    image: mysql:latest
    #                                       VFM = vue, flask, mysql
    container_name: database_todolist_VFM
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - todoapp-react-flask-mysql
    # healthcheck:
    #   test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 30s

  backend:
    build: ./server
    container_name: backend_todolist_VFM
    env_file:
      - .env
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DB_HOST: db
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    ports:
      - "5000:5000"
    networks:
      - todoapp-react-flask-mysql
    volumes:
      - ./server:/app
    depends_on:
      - db
        # condition: service_healthy

  frontend:
    build: ./client
    container_name: frontend_todolist_VFM
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
    networks:
      - todoapp-react-flask-mysql
    depends_on:
      - backend

volumes:
  db_data:

networks:
  todoapp-react-flask-mysql:
    driver: bridge