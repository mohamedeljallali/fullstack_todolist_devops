  #     - run: flake8 ./server

  #     - uses: actions/setup-node@v3
  #       with:
  #         node-version: '20'
  #     - run: npm install eslint
  #     - run: npm run lint
      
  build-and-test:
    runs-on: ubuntu-latest

    environment: env_file

    steps:
      - uses: actions/checkout@v4

      - name: Create env file with Secrets variables
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          # Create root env file for Docker Compose
          echo "MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" > .env
          echo "MYSQL_PASSWORD=$MYSQL_PASSWORD" >> .env
          echo "MYSQL_USER=$MYSQL_USER" >> .env
          echo "MYSQL_DATABASE=$MYSQL_DATABASE" >> .env
          echo "MYSQL_HOST=$MYSQL_HOST" >> .env
          echo "MYSQL_PORT=$MYSQL_PORT" >> .env
          echo "BACKEND_PORT=$BACKEND_PORT" >> .env
          echo "FRONTEND_PORT=$FRONTEND_PORT" >> .env
      
          # Create frontend config file for Vite
          echo "VITE_API_URL=$API_URL" > ./client/.env

      - name: build images
        run: docker compose build

      - name: Debug env file
        run: |
          echo "Contenu du .env :"
          cat .env
          echo "Contenu du ./client/.env :"
          cat ./client/.env
      
      - name: Verify Docker env
        run: docker compose config
        
      - name: start containers and test
        run:  docker compose up -d

      - name: debug containers
        if: failure()
        run: docker compose logs db

      - name: test URL
        run: |
          docker compose ps
