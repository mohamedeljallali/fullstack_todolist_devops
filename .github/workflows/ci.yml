  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Containers with Secrets
        env:
          # This maps your GitHub Secrets to shell variables
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          # We pass them into the command so Docker Compose can see them
          MYSQL_ROOT_PASSWORD=$DB_PASS \
          MYSQL_DATABASE=$DB_NAME \
          MYSQL_USER=$DB_USER \
          MYSQL_PASSWORD=$DB_PASS \
          
          # Create .env file for frontend configuration
          echo "VITE_API_URL=http://localhost:5000" >> ./client/.env
      - name: build images
        run: docker compose build
      
      - name: start containers and test
        run: docker compose up -d

      - name: debug containers
        if: failure()
        run: docker compose logs db

      - name: test URL
        run: |
          docker compose ps
          curl -f http://localhost:3000 || exit 1